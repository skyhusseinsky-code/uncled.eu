<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 19</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .project {
    display: flex;
    height: 100vh;
    overflow: hidden;
    }

    .code,
    .result {
    width: 50%;
    height: 100vh;
    box-sizing: border-box;
    }

    .code {
    padding: 20px;
    color: white;
    background-color: #1e1e1e;
    overflow: auto;
    }

    .result {
    padding: 0;
    border: none;
    }

    pre {
    margin: 0;
    font-family: Consolas, monospace;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre;
    tab-size: 2;
    }

    .code h1 {
    margin-top: 0;
    margin-bottom: 25px;
    }
  </style>
</head>

<body>
  <main class="project">
    <section class="code">
      <h1>My HTML code</h1>
      <pre><code id="code-output"></code></pre>
    </section>

    <iframe
      class="result"
      src="preview.html"
      title="Project preview">
    </iframe>
  </main>

  <script>
  fetch("preview.html")
    .then(response => response.text())
    .then(code => {
      document.getElementById("code-output").textContent = code;
    });
</script>
</body>
</html>
