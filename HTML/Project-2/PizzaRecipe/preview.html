<!DOCTYPE html>
<html lang="en">
<head>

  <title>PIZZA</title>

<body>
  <h1>PIZZA</h1>
  <p>Learn how to make a delicious <strong>pizza</strong>.</p>
  <h2>Ingredients</h2>
  <ul>
    <li>Dough</li>
    <li>Tomato Sauce</li>
    <li>Cheese</li>
    <li>Pepperoni</li>
  </ul>

  <h2>Instructions</h2>
  <ol>
    <li>Shape the dough into a circle.</li>
    <li>Spread the tomato sauce over the dough.</li>
    <li>Add the cheese.</li>
    <li>Add the pepperoni.</li>
    <li>Bake the pizza in the oven.</li>
  </ol>
</body>
