<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Alexia</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2b0033, #6b005f, #ff4f9a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      padding: 35px 28px;
      text-align: center;
      box-shadow: 0 0 35px rgba(255, 80, 160, 0.45);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .name {
      color: #ffd1e8;
      text-shadow: 0 0 12px rgba(255, 180, 220, 0.8);
    }

    .heart-box {
      width: 110px;
      height: 110px;
      background: white;
      border-radius: 50%;
      margin: 25px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.45);
    }

    .heart {
      width: 60px;
      height: 60px;
      fill: #ff1f5f;
    }

    .message {
      font-size: 17px;
      line-height: 1.5;
      color: #ffe6f3;
      margin-bottom: 18px;
    }

    .small-text {
      font-size: 15px;
      color: #ffd1e8;
      margin-bottom: 25px;
    }

    .line {
      width: 70px;
      height: 3px;
      background: #ffd1e8;
      border-radius: 10px;
      margin: 0 auto 22px;
    }

    .footer {
      font-size: 14px;
      color: #fff0f8;
      background: rgba(255, 255, 255, 0.12);
      padding: 12px;
      border-radius: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>For my bby <span class="name">Alexia</span></h1>

    <div class="line"></div>

    <div class="heart-box">
      <svg class="heart" viewBox="0 0 24 24">
        <path d="M12 21s-6.4-4.35-9.33-8.22C-.5 7.39 3.24 1 8.4 4.28 10.08 5.32 12 7.5 12 7.5s1.92-2.18 3.6-3.22C20.76 1 24.5 7.39 21.33 12.78 18.4 16.65 12 21 12 21z" />
      </svg>
    </div>

    <p class="message">
      I made this small page for you, because you are really special to me.
    </p>

    <p class="small-text">(loaf ya)</p>

  </div>
</body>
</html>
